name: MERALCO Electricity Rates
version: "2.1.0"
slug: meralco-ph
description: Scrapes MERALCO electricity rates and exposes them via MQTT discovery or REST API.
url: "https://github.com/rairulyle/meralco-ph"
arch:
  - amd64
  - aarch64
init: false
startup: application
services:
  - mqtt:want
options:
  mode: mqtt
  log_level: info
  scan_interval: 86400
  kwh_levels:
    - 200
  mqtt_topic_prefix: meralco
  mqtt_discovery_prefix: homeassistant
schema:
  mode: "list(mqtt|rest)"
  log_level: "list(trace|debug|info|notice|warning|error|fatal)"
  scan_interval: "int(3600,604800)"
  kwh_levels:
    - "int(50,5000)"
  mqtt_topic_prefix: str
  mqtt_discovery_prefix: str
ports:
  5000/tcp: null
ports_description:
  5000/tcp: "REST API (used in rest mode only)"
